name: Build and Deploy
on:
  push:
    branches:
      - master
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22.x
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Install
        run: |
          pnpm install
      # dist/404.html: gh-pages history mode
      - name: Build
        run: |
          npm run build-gh-pages
          cp dist/browser/index.html dist/browser/404.html
      - name: Deploy to EdgeOne Pages (Overseas)
        if: success()
        run: |
          npm install -g edgeone
          # Deploy to EdgeOne Pages with overseas region
          # The command will automatically create the project if it doesn't exist
          edgeone pages deploy dist/browser -n nav-project -t ${{ secrets.EDGEONE_API_TOKEN }} --region global
        env:
          EDGEONE_API_TOKEN: ${{ secrets.EDGEONE_API_TOKEN }}
          EDGEONE_REGION: global
